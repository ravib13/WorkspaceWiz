<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - WorkspaceWiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">🏢 WorkspaceWiz Admin</a>
            <div class="d-flex align-items-center gap-3">
                <a href="/" class="btn btn-sm btn-outline-light">User Panel</a>
                <button class="btn btn-sm btn-danger" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Toast Container -->
        <div class="toast-container position-fixed top-0 end-0 p-3"></div>

        <!-- Stats Overview -->
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card bg-primary text-white border-0 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title"><i class="bi bi-people-fill me-2"></i>Registered Users</h5>
                        <h2 class="display-4 fw-bold" id="total-users-count">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card bg-success text-white border-0 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title"><i class="bi bi-building-fill me-2"></i>Total Workspaces</h5>
                        <h2 class="display-4 fw-bold" id="total-spaces-count">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- Management Tabs -->
        <ul class="nav nav-tabs mb-3" id="adminTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="users-tab" data-bs-toggle="tab" data-bs-target="#users-pane" type="button">Manage Users</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="spaces-tab" data-bs-toggle="tab" data-bs-target="#spaces-pane" type="button">Manage Workspaces</button>
            </li>
        </ul>

        <div class="tab-content">
            <!-- Users Tab -->
            <div class="tab-pane fade show active" id="users-pane">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Registered Users List</h5>
                        <div class="d-flex gap-2">
                            <input type="text" id="user-search-input" class="form-control form-control-sm" placeholder="Search by email..." style="width: 200px;" onkeyup="loadAdminUsers()">
                            <button class="btn btn-sm btn-outline-primary" onclick="loadAdminUsers()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0 align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">Email</th>
                                        <th>Role</th>
                                        <th>Verified</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="users-table-body">
                                    <!-- User rows will be injected here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Spaces Tab -->
            <div class="tab-pane fade" id="spaces-pane">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5>Existing Workspaces</h5>
                    <button class="btn btn-primary" onclick="toggleAddSpaceForm(true)">
                        <i class="bi bi-plus-lg"></i> Add New Space
                    </button>
                </div>

                <!-- Add/Edit Form (Hidden by default) -->
                <div id="space-form-card" class="card mb-4 d-none border-primary">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0" id="space-form-title">Add New Space</h5>
                        <button type="button" class="btn-close btn-close-white" onclick="toggleAddSpaceForm(false)"></button>
                    </div>
                    <div class="card-body">
                        <input type="hidden" id="admin-space-id">
                        <div class="row g-3">
                            <div class="col-md-6"><label class="form-label">Name</label><input type="text" id="admin-space-name" class="form-control" placeholder="e.g. Sunny Desk"></div>
                            <div class="col-md-6"><label class="form-label">Type</label><select id="admin-space-type" class="form-control"><option value="Open Desk">Open Desk</option><option value="Private Cabin">Private Cabin</option><option value="Meeting Room">Meeting Room</option></select></div>
                            <div class="col-md-4"><label class="form-label">Floor</label><input type="number" id="admin-space-floor" class="form-control" placeholder="1" min="0"></div>
                            <div class="col-md-4"><label class="form-label">Capacity</label><input type="number" id="admin-space-capacity" class="form-control" placeholder="4" min="1"></div>
                            <div class="col-md-4"><label class="form-label">Price ($)</label><input type="number" id="admin-space-price" class="form-control" placeholder="50" min="0"></div>
                            <div class="col-12"><label class="form-label">Image URL (comma separated)</label><input type="text" id="admin-space-images" class="form-control" placeholder="https://example.com/image.jpg"></div>
                            <div class="col-12 text-end"><button class="btn btn-secondary me-2" onclick="toggleAddSpaceForm(false)">Cancel</button><button class="btn btn-success" onclick="saveSpace()">Save Space</button></div>
                        </div>
                    </div>
                </div>

                <div id="admin-spaces-list" class="row"></div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
