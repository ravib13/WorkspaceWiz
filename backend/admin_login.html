<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - WorkspaceWiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 1rem 3rem rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header i {
            font-size: 3rem;
            color: #1e3c72;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="bi bi-shield-lock-fill"></i>
            <h3 class="mt-3">Admin Portal</h3>
            <p class="text-muted">Secure Access</p>
        </div>

        <div id="message" class="alert d-none mb-3" role="alert"></div>
        
        <div id="step-1">
            <div class="mb-3">
                <label for="email-input" class="form-label">Admin Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" id="email-input" class="form-control" placeholder="admin@company.com" required>
                </div>
            </div>
            <button class="btn btn-primary w-100 py-2" onclick="sendAdminOtp()">
                Send Verification Code <i class="bi bi-arrow-right ms-2"></i>
            </button>
        </div>

        <div id="step-2" class="d-none">
            <div class="mb-3">
                <label for="otp-input" class="form-label">One-Time Password (OTP)</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-key"></i></span>
                    <input type="text" id="otp-input" class="form-control" placeholder="Enter 6-digit code" required>
                </div>
                <div class="form-text">Check your email inbox for the code.</div>
            </div>
            <button class="btn btn-success w-100 py-2" onclick="verifyAdminLogin()">
                <i class="bi bi-box-arrow-in-right me-2"></i> Secure Login
            </button>
            <button class="btn btn-link w-100 mt-2 text-decoration-none" onclick="location.reload()">Cancel</button>
        </div>
    </div>

    <script>
        const messageDiv = document.getElementById('message');

        function showMessage(msg, type) {
            messageDiv.textContent = msg;
            messageDiv.className = `alert alert-${type} mb-3`;
            messageDiv.classList.remove('d-none');
        }

        async function sendAdminOtp() {
            const email = document.getElementById('email-input').value;
            if (!email) {
                showMessage('Please enter your admin email.', 'danger');
                return;
            }

            showMessage('Sending OTP...', 'info');

            try {
                const response = await fetch('/api/admin/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const result = await response.json();

                if (response.ok) {
                    document.getElementById('step-1').classList.add('d-none');
                    document.getElementById('step-2').classList.remove('d-none');
                    showMessage(result.message, 'success');
                } else {
                    showMessage('Error: ' + (result.error || 'Failed to send OTP.'), 'danger');
                }
            } catch (error) {
                showMessage('A network error occurred.', 'danger');
            }
        }

        async function verifyAdminLogin() {
            const email = document.getElementById('email-input').value;
            const otp = document.getElementById('otp-input').value;

            if (!otp) {
                showMessage('Please enter the OTP.', 'danger');
                return;
            }

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });

                const result = await response.json();

                if (response.ok) {
                    showMessage(result.message, 'success');
                    // On successful login, redirect to the admin dashboard
                    setTimeout(() => window.location.href = '/admin', 1000);
                } else {
                    showMessage('Error: ' + (result.error || 'Login failed.'), 'danger');
                }
            } catch (error) {
                showMessage('A network error occurred.', 'danger');
            }
        }
    </script>
</body>
</html>
